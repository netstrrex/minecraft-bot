services:

  minecraft_server:
    image: itzg/minecraft-server:java8
    ports:
      - "25565:25565"
      - "25575:25575"
    environment:
      EULA: "TRUE"
      TYPE: "FORGE"
      VERSION: "1.16.5"
      MEMORY: "3G"
      JVM_VERSION: 8
      ENABLE_RCON: "true"
      RCON_PASSWORD: "super_strong_password"
      RCON_PORT: 25575

    networks:
      - rcon_network

    volumes:
      - ./data:/data
      - ./mods:/mods

  rcon_bot:
    container_name: rcon_bot
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP__BOT__TOKEN: ${APP__BOT__TOKEN}
      APP__MINECRAFT_SERVER__IP: ${APP__MINECRAFT_SERVER__IP}
    volumes:
      - ./src/players.json:/app/players.json
    networks:
      - rcon_network
    depends_on:
      - minecraft_server

networks:
  rcon_network:
    driver: bridge